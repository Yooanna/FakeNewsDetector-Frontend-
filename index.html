<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthGuard | AI Fact Verification</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="wrapper">
    <!-- SDG Banner -->
    <div class="sdg-banner">
        <div class="sdg-icons">🌍 ⚖️ 🤝</div>
        <div>SDG 16: Peace, Justice & Strong Institutions</div>
    </div>

    <!-- Main Card -->
    <div class="card">
        <div class="trust-badge">
            <span>🔒</span> Blockchain Verified · AI Powered
        </div>

        <div class="title">
            <span class="gradient">TruthGuard</span>
            <div class="sub">Verify. Trust. Act.</div>
        </div>

        <div class="mission">
            Fighting misinformation for a <span class="highlight">transparent world</span>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat"><div class="num" id="count">1,247</div><div class="label">Verified</div></div>
            <div class="stat"><div class="num">99.2%</div><div class="label">Accuracy</div></div>
            <div class="stat"><div class="num">✓</div><div class="label">Immutable</div></div>
        </div>

        <!-- Input -->
        <textarea id="newsInput" placeholder="Paste news article or URL here..." rows="5"></textarea>

        <!-- Button -->
        <button id="checkBtn">Verify Truth →</button>

        <!-- Loading -->
        <div id="loading" style="display:none" class="loading">
            <div class="spinner"></div>
            <div>AI analyzing content...</div>
        </div>

        <!-- Results -->
        <div id="results" style="display:none"></div>

        <div class="footer">
            <div class="sdg-links">🎯 SDG 16 | 💡 SDG 9</div>
            <div>© 2026 TruthGuard · AllSparkBloom</div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
