<!DOCTYPE html>
<html>
<body>
    <h2>Test API</h2>
    <button onclick="testAPI()">Click to Test API</button>
    <p id="testResult"></p>

    <script>
    function testAPI() {
        fetch('http://192.168.100.12:5000/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: "Aliens landed on Earth" })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('testResult').innerHTML = 
                '✅ API WORKING! Response: ' + JSON.stringify(data);
        })
        .catch(error => {
            document.getElementById('testResult').innerHTML = 
                '❌ API NOT WORKING: ' + error;
        });
    }
    </script>
</body>
</html>
